# ========================================
# アプリケーション共通設定
# ========================================
spring.application.name=inquiry-app
server.port=8080

# ========================================
# H2 インメモリデータベース（ローカル開発用デフォルト）
# ========================================
spring.datasource.url=jdbc:h2:mem:inquiry_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# JPA / Hibernate（ローカル開発用）
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Open Session in View（Thymeleafでの遅延ロードを有効にする）
spring.jpa.open-in-view=true

# ========================================
# Flyway（ローカル開発: H2用マイグレーション）
# ========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2
spring.flyway.baseline-on-migrate=true

# ========================================
# ファイルアップロード設定
# ========================================
app.upload.dir=${java.io.tmpdir}/inquiry-uploads
app.upload.max-file-size=5242880
app.upload.max-files-per-ticket=5
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ========================================
# チケット一覧設定
# ========================================
app.ticket.page-size=20

# ========================================
# ロギング設定
# ========================================
logging.level.com.example.inquiry=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# ========================================
# Thymeleaf
# ========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
