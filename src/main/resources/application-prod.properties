# ========================================
# 本番環境設定（Render.com + PostgreSQL）
# このファイルは SPRING_PROFILES_ACTIVE=prod のときに有効
# ========================================

# ========================================
# PostgreSQL（Renderの環境変数から注入）
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# H2コンソールは無効
spring.h2.console.enabled=false

# ========================================
# JPA / Hibernate（PostgreSQL用）
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# ========================================
# Flyway（PostgreSQL用マイグレーション）
# ========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/postgresql
spring.flyway.baseline-on-migrate=true

# ========================================
# ファイルアップロード（Renderの一時ディレクトリ）
# ========================================
app.upload.dir=/tmp/inquiry-uploads
app.upload.max-files-per-ticket=5
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ========================================
# チケット一覧設定
# ========================================
app.ticket.page-size=20

# ========================================
# ロギング
# ========================================
logging.level.com.example.inquiry=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# ========================================
# Thymeleaf
# ========================================
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8
