<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>403 Forbidden - 問い合わせ管理システム</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="main-content error-page">
  <div class="error-code">403</div>
  <p class="error-message" th:text="${message} ?: 'このページへのアクセス権限がありません'"></p>
  <a href="/tickets" class="btn btn-primary">チケット一覧に戻る</a>
</div>
</body>
</html>
