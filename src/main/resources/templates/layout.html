<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' - 問い合わせ管理システム'">問い合わせ管理システム</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a th:href="@{/tickets}" class="site-title">問い合わせ管理システム</a>
    <nav class="header-nav" sec:authorize="isAuthenticated()">
      <span class="user-info">
        <span sec:authentication="principal.displayName"></span>
        <span class="badge-role" sec:authorize="hasRole('ADMIN')">管理者</span>
        <span class="badge-role badge-user" sec:authorize="hasRole('USER')">ユーザー</span>
      </span>
      <a th:href="@{/tickets/new}" class="btn btn-primary btn-sm">＋ 新規チケット</a>
      <form th:action="@{/logout}" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-ghost btn-sm">ログアウト</button>
      </form>
    </nav>
  </div>
</header>

<main class="main-content">
  <th:block th:fragment="content"><!-- コンテンツここに --></th:block>
</main>

</body>
</html>
